# Fluentd Configuration for Enhanced Logging System
# Ship structured logs to Elasticsearch/OpenSearch

<source>
  @type tail
  @id aux_json
  path /home/es/lab/.log/aux.json
  pos_file /var/log/fluentd/aux.json.pos
  tag lab.aux
  format json
  refresh_interval 1s
  rotate_wait 5s
  enable_stat_watcher false
  read_from_head true
</source>

<source>
  @type tail
  @id aux_text
  path /home/es/lab/.log/aux.log
  pos_file /var/log/fluentd/aux.log.pos
  tag lab.aux_text
  format none
  refresh_interval 1s
  rotate_wait 5s
  enable_stat_watcher false
  read_from_head true
</source>

# Add cluster-wide metadata
<filter lab.**>
  @type record_transformer
  enable_ruby true
  <record>
    cluster_name ${CLUSTER_NAME}
    environment ${ENVIRONMENT}
    region ${AWS_REGION}
    timestamp_ingested ${time.strftime('%Y-%m-%dT%H:%M:%S.%L%z')}
    source_host ${hostname}
  </record>
</filter>

# Route structured logs to main index
<match lab.aux>
  @type elasticsearch
  @id out_aux_es
  host elasticsearch.logging.svc.cluster.local
  port 9200
  scheme https
  ssl_verify false
  user ${ELASTICSEARCH_USER}
  password ${ELASTICSEARCH_PASSWORD}
  
  index_name lab-operational-%Y.%m.%d
  type_name _doc
  
  # Buffer configuration for high throughput
  <buffer time>
    @type file
    path /var/log/fluentd/aux_buffer
    timekey 3600s
    timekey_wait 60s
    chunk_limit_size 32MB
    total_limit_size 1GB
    flush_interval 30s
    retry_max_interval 30s
    retry_forever true
  </buffer>
  
  # Template for index settings
  template_name lab_operational
  template_file /etc/fluentd/templates/operational.json
  customize_template {"settings":{"number_of_shards":3,"number_of_replicas":1}}
</match>

# Route text fallback logs to text index
<match lab.aux_text>
  @type elasticsearch
  @id out_aux_text_es
  host elasticsearch.logging.svc.cluster.local
  port 9200
  scheme https
  ssl_verify false
  user ${ELASTICSEARCH_USER}
  password ${ELASTICSEARCH_PASSWORD}
  
  index_name lab-text-%Y.%m.%d
  type_name _doc
  
  <buffer time>
    @type file
    path /var/log/fluentd/text_buffer
    timekey 86400s
    timekey_wait 60s
    chunk_limit_size 16MB
    total_limit_size 512MB
    flush_interval 60s
  </buffer>
</match>

# Dead letter queue for failed logs
<label @ERROR>
  <match **>
    @type file
    @id out_error_file
    path /var/log/fluentd/error
    append true
    <format>
      @type json
    </format>
    <buffer>
      flush_mode immediate
    </buffer>
  </match>
</label>
